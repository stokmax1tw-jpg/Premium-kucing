<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonton Video - KUCING PREMIUM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/logo.png" type="image/png">
  <style>
    .watch-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
      padding: 20px 30px;
    }
    .video-player-wrap {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 75vh;
      border: var(--border-glow);
    }
    .video-player-wrap video {
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
    }
    .video-details { padding: 16px 0; }
    .video-details h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: var(--text-main);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .video-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .video-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .sidebar-related { }
    .related-title {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: var(--text-main);
      margin-bottom: 12px;
    }
    .related-card {
      display: flex;
      gap: 10px;
      padding: 8px;
      border-radius: 12px;
      border: var(--border-glow);
      background: var(--bg-card);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      text-decoration: none;
      margin-bottom: 8px;
    }
    .related-card:hover {
      transform: translateX(4px);
      border-color: rgba(233,30,140,0.4);
      background: rgba(40,5,25,0.95);
    }
    .related-thumb {
      width: 70px;
      height: 90px;
      background: linear-gradient(135deg, var(--bg-dark), rgba(139,0,56,0.3));
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      overflow: hidden;
    }
    .related-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .related-info { flex: 1; min-width: 0; }
    .related-title-text {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .related-meta { font-size: 10px; color: var(--text-dim); }

    @media (max-width: 768px) {
      .watch-layout { grid-template-columns: 1fr; padding: 12px 16px; }
      .sidebar-related { display: none; }
    }
  </style>
</head>
<body>
  <div class="sakura-bg"></div>
  <div class="page-wrapper">
    <nav class="navbar">
      <a href="/" class="nav-logo">
        <div class="logo-icon">
          <img src="/images/logo.png" alt="Logo" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.innerHTML='&#128049;'">
        </div>
        <span class="logo-text">KUCING PREMIUM</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link"><span>Beranda</span></a>
        <a href="/terbaru" class="nav-link"><span>Terbaru</span></a>
        <a href="/douyin" class="nav-link"><span>Douyin</span></a>
        <a href="/lokal" class="nav-link"><span>Lokal</span></a>
        <a href="/barat" class="nav-link"><span>Barat</span></a>
        <a href="/cosplayer" class="nav-link"><span>Cosplayer</span></a>
        <a href="/bochil" class="nav-link"><span>Bochil</span></a>
      </div>
    </nav>

    <!-- Breadcrumb -->
    <div style="padding:12px 30px;font-size:12px;color:var(--text-dim);">
      <a href="/" style="color:var(--text-dim);text-decoration:none;">Beranda</a>
      <span style="margin:0 6px;">/</span>
      <span id="bread-cat" style="color:var(--text-dim);"></span>
      <span style="margin:0 6px;">/</span>
      <span style="color:var(--pink-light);" id="bread-title">Video</span>
    </div>

    <div class="watch-layout">
      <!-- Main -->
      <div>
        <div class="video-player-wrap" id="player-wrap">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
        <div class="video-details">
          <h1 id="video-title">Memuat...</h1>
          <div class="video-stats">
            <span id="video-views">0 views</span>
            <span id="video-date"></span>
            <span id="video-cat" style="color:var(--pink-light);font-weight:700;"></span>
          </div>
          <div class="video-actions" id="video-actions"></div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar-related">
        <div class="related-title">Video Lainnya</div>
        <div id="related-list"></div>
      </div>
    </div>

    <footer>
      <div class="footer-logo">KUCING PREMIUM</div>
      <p>Platform video entertainment terbaik.</p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const videoId = window.location.pathname.split('/video/')[1];

    async function loadVideo() {
      try {
        const res = await fetch(`/api/videos/${videoId}`);
        if (!res.ok) {
          document.getElementById('player-wrap').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim);">Video tidak ditemukan</div>';
          return;
        }
        const v = await res.json();

        document.title = `${v.title} - KUCING PREMIUM`;
        document.getElementById('video-title').textContent = v.title;
        document.getElementById('video-views').textContent = `${formatNum(v.views)} views`;
        document.getElementById('video-date').textContent = formatDate(v.uploadedAt);
        document.getElementById('video-cat').textContent = (v.category || '').toUpperCase();
        document.getElementById('bread-title').textContent = v.title;
        document.getElementById('bread-cat').innerHTML = `<a href="/${v.category}" style="color:var(--text-dim);text-decoration:none;">${v.category}</a>`;

        document.getElementById('player-wrap').innerHTML = `
          <video controls autoplay playsinline preload="auto" style="width:100%;max-height:75vh;object-fit:contain;">
            <source src="${v.url}" type="video/mp4">
            Browser kamu tidak mendukung video ini.
          </video>
        `;

        document.getElementById('video-actions').innerHTML = `
          <a class="btn-bubble btn-primary" href="${v.url}" download="${v.title}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
            </svg>
            Download
          </a>
          <a class="btn-bubble btn-outline" href="/${v.category}">
            Kategori: ${v.category}
          </a>
          <button class="btn-bubble btn-outline" onclick="shareVideo('${v.title}', window.location.href)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186zm0-12.814a2.25 2.25 0 1 0 3.936-2.185 2.25 2.25 0 0 0-3.936 2.185z"/>
            </svg>
            Bagikan
          </button>
        `;

        // Count view
        fetch(`/api/videos/${videoId}/view`, { method: 'POST' });

        // Load related
        loadRelated(v.category, v.id);
      } catch (e) {
        document.getElementById('player-wrap').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim);">Gagal memuat video</div>';
      }
    }

    async function loadRelated(category, currentId) {
      try {
        const res = await fetch(`/api/videos?category=${category}&limit=10`);
        const data = await res.json();
        const related = (data.videos || []).filter(v => v.id !== currentId).slice(0, 8);
        const container = document.getElementById('related-list');

        if (related.length === 0) {
          container.innerHTML = '<p style="color:var(--text-dim);font-size:13px;">Tidak ada video lain</p>';
          return;
        }

        container.innerHTML = related.map(v => `
          <a href="/video/${v.id}" class="related-card">
            <div class="related-thumb">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--pink-dark)" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653z"/>
              </svg>
            </div>
            <div class="related-info">
              <div class="related-title-text">${v.title}</div>
              <div class="related-meta">${formatNum(v.views)} views</div>
            </div>
          </a>
        `).join('');
      } catch (e) {}
    }

    function shareVideo(title, url) {
      if (navigator.share) {
        navigator.share({ title, url });
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert('Link disalin!');
        });
      }
    }

    loadVideo();
  </script>
</body>
</html>
